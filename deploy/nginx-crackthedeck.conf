# Nginx: CrackTheDeck — статика (crackthedeck-deploy) + прокси /api на бэкенд (uvicorn :8000)
# Использование: скопировать в sites-available, заменить YOUR_DOMAIN_OR_IP, затем nginx -t && systemctl reload nginx

server {
    listen 80 default_server;
    server_name YOUR_DOMAIN_OR_IP _;

    root /var/www/crackthedeck/crackthedeck-deploy;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}
